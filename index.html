<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// CONFIG
// ============================================================

const UNROLLED_W = 8640;
const UNROLLED_H = 3840;
const PLATE_W = 7680;
const PLATE_H = 4320;

const CANVAS_COLS = 8;
const CANVAS_ROWS = 2;

// ============================================================
// PANEL GEOMETRY
// ============================================================

const PANELS = [
  { name: "RT1.B", corners: [[859.74,1794.82,32.37],[859.74,1794.82,1477.67],[73.73,1987.15,1477.67],[73.73,1987.15,32.37]] },
  { name: "RT1.F", corners: [[859.74,1794.82,-1477.67],[859.74,1794.82,-32.37],[73.73,1987.15,-32.37],[73.73,1987.15,-1477.67]] },
  { name: "RT2.B", corners: [[1591.35,1195.04,32.37],[1591.35,1195.04,1477.67],[982.96,1728.58,1477.67],[982.96,1728.58,32.37]] },
  { name: "RT2.F", corners: [[1591.35,1195.04,-1477.67],[1591.35,1195.04,-32.37],[982.96,1728.58,-32.37],[982.96,1728.58,-1477.67]] },
  { name: "RB1.B", corners: [[1963.35,325.21,32.37],[1963.35,325.21,1477.67],[1670.07,1079.39,1477.67],[1670.07,1079.39,32.37]] },
  { name: "RB1.F", corners: [[1963.35,325.21,-1477.67],[1963.35,325.21,-32.37],[1670.07,1079.39,-32.37],[1670.07,1079.39,-1477.67]] },
  { name: "RB2.B", corners: [[1891.68,-618.11,32.37],[1891.68,-618.11,1477.67],[1979.77,186.28,1477.67],[1979.77,186.28,32.37]] },
  { name: "RB2.F", corners: [[1891.68,-618.11,-1477.67],[1891.68,-618.11,-32.37],[1979.77,186.28,-32.37],[1979.77,186.28,-1477.67]] },
  { name: "LB2.B", corners: [[-1979.77,186.28,32.37],[-1979.77,186.28,1477.67],[-1891.68,-618.11,1477.67],[-1891.68,-618.11,32.37]] },
  { name: "LB2.F", corners: [[-1979.77,186.28,-1477.67],[-1979.77,186.28,-32.37],[-1891.68,-618.11,-32.37],[-1891.68,-618.11,-1477.67]] },
  { name: "LB1.B", corners: [[-1670.07,1079.39,32.37],[-1670.07,1079.39,1477.67],[-1963.35,325.21,1477.67],[-1963.35,325.21,32.37]] },
  { name: "LB1.F", corners: [[-1670.07,1079.39,-1477.67],[-1670.07,1079.39,-32.37],[-1963.35,325.21,-32.37],[-1963.35,325.21,-1477.67]] },
  { name: "LT2.B", corners: [[-982.96,1728.58,32.37],[-982.96,1728.58,1477.67],[-1591.35,1195.04,1477.67],[-1591.35,1195.04,32.37]] },
  { name: "LT2.F", corners: [[-982.96,1728.58,-1477.67],[-982.96,1728.58,-32.37],[-1591.35,1195.04,-32.37],[-1591.35,1195.04,-1477.67]] },
  { name: "LT1.B", corners: [[-73.73,1987.15,32.37],[-73.73,1987.15,1477.67],[-859.74,1794.82,1477.67],[-859.74,1794.82,32.37]] },
  { name: "LT1.F", corners: [[-73.73,1987.15,-1477.67],[-73.73,1987.15,-32.37],[-859.74,1794.82,-32.37],[-859.74,1794.82,-1477.67]] },
];

const PANEL_TO_CELL = {
  "LT1.F": [1, 0], "LT1.B": [0, 0],
  "LT2.F": [1, 1], "LT2.B": [0, 1],
  "LB1.F": [1, 2], "LB1.B": [0, 2],
  "LB2.F": [1, 3], "LB2.B": [0, 3],
  "RT1.B": [3, 0], "RT1.F": [2, 0],
  "RT2.B": [3, 1], "RT2.F": [2, 1],
  "RB1.B": [3, 2], "RB1.F": [2, 2],
  "RB2.B": [3, 3], "RB2.F": [2, 3],
};

// ============================================================
// SCENE SETUP
// ============================================================

const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(1);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
renderer.autoClear = false;  // we manage clearing manually for layered rendering
document.body.appendChild(renderer.domElement);

const gl = renderer.getContext();
const maxTex = gl.getParameter(gl.MAX_TEXTURE_SIZE);
const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
const renderer_str = debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : '?';
console.log("Max texture size:", maxTex);
console.log("Renderer:", renderer_str);
document.getElementById('canvas-size').textContent = `MaxTex: ${maxTex} | ${renderer_str}`;

// ============================================================
// LOAD TEST CARDS
// ============================================================

const loader = new THREE.TextureLoader();
const cardPaths = [
  './assets/test-cards/TestCard_Q1.png',
  './assets/test-cards/TestCard_Q2.png',
  './assets/test-cards/TestCard_Q3.png',
  './assets/test-cards/TestCard_Q4.png',
];

// Background images for the unrolled canvas layer (B).
// Add more by dropping files in assets/backgrounds/ and listing here.
const backgroundPaths = [
  './assets/backgrounds/PCI_SPACE_IMAGES_01.png',
  './assets/backgrounds/PCI_SPACE_IMAGES_02.png',
  './assets/backgrounds/PCI_SPACE_IMAGES_03.png',
];

function loadAll() {
  return Promise.all(cardPaths.map(p => new Promise((resolve, reject) => {
    loader.load(p, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      resolve(tex);
    }, undefined, err => reject(`Failed to load ${p}: ${err}`));
  })));
}

function loadBackgrounds() {
  // Best-effort load. Missing files don't fail the whole startup;
  // they're filtered out so the app still works without backgrounds.
  return Promise.all(backgroundPaths.map(p => new Promise((resolve) => {
    loader.load(p, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.minFilter = THREE.LinearFilter;
      tex.magFilter = THREE.LinearFilter;
      resolve(tex);
    }, undefined, () => {
      console.warn(`Background not loaded: ${p}`);
      resolve(null);
    });
  }))).then(results => results.filter(t => t !== null));
}

// ============================================================
// CONTENT LAYER 0: BACKGROUND (B)
// A single full-canvas image. Cycle through available backgrounds with N.
// ============================================================

function buildBackgroundLayer(backgrounds) {
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(0, UNROLLED_W, UNROLLED_H, 0, -1, 1);

  let currentTexture = backgrounds.length > 0 ? backgrounds[0] : null;

  const mat = new THREE.MeshBasicMaterial({
    map: currentTexture,
    color: 0xffffff,
  });
  const geom = new THREE.PlaneGeometry(UNROLLED_W, UNROLLED_H);
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(UNROLLED_W / 2, UNROLLED_H / 2, -1);  // behind other content
  scene.add(mesh);

  let currentIndex = 0;

  function setIndex(i) {
    if (backgrounds.length === 0) return;
    currentIndex = ((i % backgrounds.length) + backgrounds.length) % backgrounds.length;
    mat.map = backgrounds[currentIndex];
    mat.needsUpdate = true;
  }

  function cycle() {
    setIndex(currentIndex + 1);
  }

  function getInfo() {
    if (backgrounds.length === 0) return '(no backgrounds loaded)';
    return `${currentIndex + 1}/${backgrounds.length}`;
  }

  return { scene, camera, cycle, setIndex, getInfo, count: () => backgrounds.length };
}

// ============================================================
// CONTENT LAYER 1: TEST CARDS (Q)
// 16 cells, each one quadrant of one test card, pre-rotated
// ============================================================

const UNROLLED_LAYOUT = [
  // Top row
  [1, 'BL', false], [1, 'TL', false], [0, 'BL', false], [0, 'TL', false],
  [2, 'TR', true],  [2, 'BR', true],  [3, 'TR', true],  [3, 'BR', true],
  // Bottom row
  [1, 'BR', false], [1, 'TR', false], [0, 'BR', false], [0, 'TR', false],
  [2, 'TL', true],  [2, 'BL', true],  [3, 'TL', true],  [3, 'BL', true],
];

const CELL_W = UNROLLED_W / CANVAS_COLS;
const CELL_H = UNROLLED_H / CANVAS_ROWS;

function quadrantUVs(quadrant) {
  switch (quadrant) {
    case 'TL': return [0.0, 0.5, 0.5, 1.0];
    case 'TR': return [0.5, 0.5, 1.0, 1.0];
    case 'BL': return [0.0, 0.0, 0.5, 0.5];
    case 'BR': return [0.5, 0.0, 1.0, 0.5];
  }
}

function buildTestCardsLayer(textures) {
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(0, UNROLLED_W, UNROLLED_H, 0, -1, 1);

  for (let i = 0; i < 16; i++) {
    const col = i % CANVAS_COLS;
    const row = Math.floor(i / CANVAS_COLS);
    const [cardIdx, quadrant, useCCW] = UNROLLED_LAYOUT[i];
    const texture = textures[cardIdx];
    const [uMin, vMin, uMax, vMax] = quadrantUVs(quadrant);

    const mat = new THREE.ShaderMaterial({
      uniforms: {
        tex:    { value: texture },
        uMin:   { value: uMin }, vMin: { value: vMin },
        uMax:   { value: uMax }, vMax: { value: vMax },
        rotCCW: { value: useCCW ? 1.0 : 0.0 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D tex;
        uniform float uMin, vMin, uMax, vMax, rotCCW;
        varying vec2 vUv;
        void main() {
          float qu, qv;
          if (rotCCW > 0.5) { qu = vUv.y;       qv = 1.0 - vUv.x; }
          else              { qu = 1.0 - vUv.y; qv = vUv.x; }
          float texU = uMin + (uMax - uMin) * qu;
          float texV = vMin + (vMax - vMin) * qv;
          gl_FragColor = texture2D(tex, vec2(texU, texV));
        }
      `,
    });

    const geom = new THREE.PlaneGeometry(CELL_W, CELL_H);
    const mesh = new THREE.Mesh(geom, mat);
    const cx = col * CELL_W + CELL_W / 2;
    const cy = UNROLLED_H - (row * CELL_H + CELL_H / 2);
    mesh.position.set(cx, cy, 0);
    scene.add(mesh);
  }

  return { scene, camera };
}

// ============================================================
// CONTENT LAYER 2: ORBITING 3D SHAPES (3)
// A few colored spheres orbiting the canvas's horizontal centerline.
// Renders into the unrolled canvas; through strip-and-rotate, the
// spheres appear to circulate around the apex of the arch.
// ============================================================

function buildOrbitLayer() {
  const scene = new THREE.Scene();

  // Perspective camera centered on the canvas. We position the camera
  // looking down at the canvas's center (UNROLLED_W/2, UNROLLED_H/2)
  // from a distance that makes the canvas extent fit the frustum.
  // Shapes orbit at radii constrained to the canvas extent so they
  // never wander outside the unrolled-canvas region.
  const aspect = UNROLLED_W / UNROLLED_H;
  const fov = 40;  // degrees
  // At distance d, the visible vertical extent at the focal plane is
  // 2 * d * tan(fov/2). We want this to equal UNROLLED_H so shapes
  // orbiting at canvas-extent radii stay in frame.
  const distance = (UNROLLED_H / 2) / Math.tan((fov / 2) * Math.PI / 180);
  const camera = new THREE.PerspectiveCamera(fov, aspect, 100, distance * 3);
  camera.position.set(UNROLLED_W / 2, UNROLLED_H / 2, distance);
  camera.lookAt(UNROLLED_W / 2, UNROLLED_H / 2, 0);

  // Lighting
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(UNROLLED_W * 0.7, UNROLLED_H * 0.8, distance * 0.6);
  scene.add(dir);

  // Orbit radii constrained to the canvas extent (smaller than W/2 to
  // keep shapes safely inside).
  const maxRadius = UNROLLED_W * 0.42;
  const shapes = [
    { color: 0xff5050, radius: maxRadius * 0.85, speed: 0.3,  phase: 0,    size: 250 },
    { color: 0x50ff80, radius: maxRadius * 0.70, speed: 0.45, phase: 1.2,  size: 200 },
    { color: 0x5080ff, radius: maxRadius * 0.92, speed: 0.25, phase: 2.4,  size: 280 },
    { color: 0xffe040, radius: maxRadius * 0.55, speed: 0.6,  phase: 3.6,  size: 180 },
    { color: 0xff80ff, radius: maxRadius * 0.98, speed: 0.2,  phase: 5.0,  size: 220 },
  ];

  const meshes = [];
  for (const s of shapes) {
    const geom = new THREE.SphereGeometry(s.size, 32, 24);
    const mat = new THREE.MeshStandardMaterial({
      color: s.color, roughness: 0.4, metalness: 0.2,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.userData = s;
    scene.add(mesh);
    meshes.push(mesh);
  }

  // A central reference cube at the canvas origin
  const cubeGeom = new THREE.BoxGeometry(400, 400, 400);
  const cubeMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.6 });
  const cube = new THREE.Mesh(cubeGeom, cubeMat);
  cube.position.set(UNROLLED_W / 2, UNROLLED_H / 2, 0);
  scene.add(cube);

  // Wobble bounds also constrained to canvas extent
  const verticalWobble = UNROLLED_H * 0.15;
  const depthWobble = 800;

  function update(t) {
    for (const mesh of meshes) {
      const s = mesh.userData;
      const angle = t * s.speed + s.phase;
      mesh.position.x = UNROLLED_W / 2 + Math.cos(angle) * s.radius;
      mesh.position.y = UNROLLED_H / 2 + Math.sin(angle * 1.3) * verticalWobble;
      mesh.position.z = Math.sin(angle) * depthWobble;
    }
    cube.rotation.x = t * 0.5;
    cube.rotation.y = t * 0.7;
  }

  return { scene, camera, update };
}

// ============================================================
// CONTENT LAYER 3: PARTICLE NETWORK (P)
// Drifting points with lines drawn between nearby pairs.
// ============================================================

function buildParticleLayer() {
  const scene = new THREE.Scene();
  // Orthographic camera constrained to the canvas's coordinate system
  // (0..UNROLLED_W, 0..UNROLLED_H). Particles that drift beyond the
  // canvas extent get clipped by the camera frustum and disappear,
  // rather than rendering into the canvas at out-of-range coordinates.
  const camera = new THREE.OrthographicCamera(
    0, UNROLLED_W,
    UNROLLED_H, 0,
    -1000, 1000
  );

  const PARTICLE_COUNT = 80;
  const CONNECTION_DIST = 1200;

  // Particle state — initialized in canvas-coordinate space (0..W, 0..H)
  const positions = new Float32Array(PARTICLE_COUNT * 3);
  const velocities = new Float32Array(PARTICLE_COUNT * 3);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions[i*3 + 0] = Math.random() * UNROLLED_W;
    positions[i*3 + 1] = Math.random() * UNROLLED_H;
    positions[i*3 + 2] = 0;
    velocities[i*3 + 0] = (Math.random() - 0.5) * 200;
    velocities[i*3 + 1] = (Math.random() - 0.5) * 200;
    velocities[i*3 + 2] = 0;
  }

  // Particles as Points
  const pointsGeom = new THREE.BufferGeometry();
  pointsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const pointsMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 30,
    sizeAttenuation: false,
    transparent: true,
    opacity: 0.9,
  });
  const points = new THREE.Points(pointsGeom, pointsMat);
  scene.add(points);

  // Lines (rebuilt each frame based on proximity)
  const linesGeom = new THREE.BufferGeometry();
  // Pre-allocate enough space for the worst case (all pairs connected)
  const maxLineVerts = PARTICLE_COUNT * PARTICLE_COUNT * 2 * 3;
  const lineVerts = new Float32Array(maxLineVerts);
  const lineColors = new Float32Array(maxLineVerts / 3 * 4);
  linesGeom.setAttribute('position', new THREE.BufferAttribute(lineVerts, 3));
  linesGeom.setAttribute('color', new THREE.BufferAttribute(lineColors, 4));
  const linesMat = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
  });
  const lines = new THREE.LineSegments(linesGeom, linesMat);
  scene.add(lines);

  let lastTime = performance.now();

  function reset() {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      positions[i*3 + 0] = Math.random() * UNROLLED_W;
      positions[i*3 + 1] = Math.random() * UNROLLED_H;
      positions[i*3 + 2] = 0;
      velocities[i*3 + 0] = (Math.random() - 0.5) * 200;
      velocities[i*3 + 1] = (Math.random() - 0.5) * 200;
      velocities[i*3 + 2] = 0;
    }
    pointsGeom.attributes.position.needsUpdate = true;
    lastTime = performance.now();
  }

  function update(t) {
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.1);  // cap dt to avoid jumps
    lastTime = now;

    // Drift particles freely (no edge wrapping)
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      positions[i*3+0] += velocities[i*3+0] * dt;
      positions[i*3+1] += velocities[i*3+1] * dt;
    }
    pointsGeom.attributes.position.needsUpdate = true;

    // Build line segments for nearby pairs
    let lineCount = 0;
    const maxDist = CONNECTION_DIST;
    const maxDist2 = maxDist * maxDist;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      for (let j = i + 1; j < PARTICLE_COUNT; j++) {
        const dx = positions[i*3+0] - positions[j*3+0];
        const dy = positions[i*3+1] - positions[j*3+1];
        const d2 = dx*dx + dy*dy;
        if (d2 < maxDist2) {
          const alpha = 1 - Math.sqrt(d2) / maxDist;
          // First vertex
          lineVerts[lineCount*6 + 0] = positions[i*3+0];
          lineVerts[lineCount*6 + 1] = positions[i*3+1];
          lineVerts[lineCount*6 + 2] = 0;
          // Second vertex
          lineVerts[lineCount*6 + 3] = positions[j*3+0];
          lineVerts[lineCount*6 + 4] = positions[j*3+1];
          lineVerts[lineCount*6 + 5] = 0;
          // Colors (RGBA per vertex)
          lineColors[lineCount*8 + 0] = 1; lineColors[lineCount*8 + 1] = 1;
          lineColors[lineCount*8 + 2] = 1; lineColors[lineCount*8 + 3] = alpha;
          lineColors[lineCount*8 + 4] = 1; lineColors[lineCount*8 + 5] = 1;
          lineColors[lineCount*8 + 6] = 1; lineColors[lineCount*8 + 7] = alpha;
          lineCount++;
        }
      }
    }
    linesGeom.setDrawRange(0, lineCount * 2);
    linesGeom.attributes.position.needsUpdate = true;
    linesGeom.attributes.color.needsUpdate = true;
  }

  return { scene, camera, update, reset };
}

// ============================================================
// CONTENT LAYER 4: MARKERS (M)
// Reference geometry on the unrolled canvas:
//   - Colored corner blocks (TL=red, TR=green, BL=blue, BR=yellow)
//   - Cell grid lines (8 cols × 2 rows)
//   - Apex line (horizontal center, where left/right walls meet)
//   - Tunnel midline (vertical center, mid-tunnel)
// Useful for authoring content, debugging cell alignment, and
// teaching the team the canvas's coordinate system.
// ============================================================

function buildMarkersLayer() {
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(0, UNROLLED_W, UNROLLED_H, 0, -1, 1);

  // === BACK: White border outline around the entire unrolled canvas ===
  // Drawn as four thin rectangles along the canvas edges.
  const BORDER_THICKNESS = 16;
  const borderRects = [
    // Top edge: full width, top of canvas
    { w: UNROLLED_W, h: BORDER_THICKNESS, x: UNROLLED_W / 2, y: UNROLLED_H - BORDER_THICKNESS / 2 },
    // Bottom edge: full width, bottom of canvas
    { w: UNROLLED_W, h: BORDER_THICKNESS, x: UNROLLED_W / 2, y: BORDER_THICKNESS / 2 },
    // Left edge: full height, left of canvas
    { w: BORDER_THICKNESS, h: UNROLLED_H, x: BORDER_THICKNESS / 2, y: UNROLLED_H / 2 },
    // Right edge: full height, right of canvas
    { w: BORDER_THICKNESS, h: UNROLLED_H, x: UNROLLED_W - BORDER_THICKNESS / 2, y: UNROLLED_H / 2 },
  ];
  for (const r of borderRects) {
    const geom = new THREE.PlaneGeometry(r.w, r.h);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(r.x, r.y, 0);
    scene.add(mesh);
  }

  // === MIDDLE: Colored corner markers at the four canvas corners ===
  // Red TL, Blue TR, Green BL, Yellow BR.
  // Pushed right into the actual corners (over the white border).
  const BLOCK_SIZE = 240;
  const cornerMarkers = [
    { color: 0xff3030, x: BLOCK_SIZE / 2,                 y: UNROLLED_H - BLOCK_SIZE / 2 },  // TL red
    { color: 0x3050ff, x: UNROLLED_W - BLOCK_SIZE / 2,    y: UNROLLED_H - BLOCK_SIZE / 2 },  // TR blue
    { color: 0x30ff30, x: BLOCK_SIZE / 2,                 y: BLOCK_SIZE / 2 },               // BL green
    { color: 0xffe030, x: UNROLLED_W - BLOCK_SIZE / 2,    y: BLOCK_SIZE / 2 },               // BR yellow
  ];
  for (const c of cornerMarkers) {
    const geom = new THREE.PlaneGeometry(BLOCK_SIZE, BLOCK_SIZE);
    const mat = new THREE.MeshBasicMaterial({ color: c.color });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(c.x, c.y, 0);
    scene.add(mesh);
  }

  // === FRONT: Centerlines as thick rectangles ===
  // (LineBasicMaterial linewidth doesn't render >1px on macOS WebGL/ANGLE,
  //  so we use planes instead.)
  const LINE_THICKNESS = 16;

  // Apex line — horizontal center, cyan
  {
    const geom = new THREE.PlaneGeometry(UNROLLED_W, LINE_THICKNESS);
    const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(UNROLLED_W / 2, UNROLLED_H / 2, 0);
    scene.add(mesh);
  }

  // Tunnel midline — vertical center, magenta
  {
    const geom = new THREE.PlaneGeometry(LINE_THICKNESS, UNROLLED_H);
    const mat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(UNROLLED_W / 2, UNROLLED_H / 2, 0);
    scene.add(mesh);
  }

  return { scene, camera };
}

// ============================================================
// PASS 2: STRIP-AND-ROTATE
// ============================================================

function buildPlateScene(unrolledTexture) {
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(0, PLATE_W, PLATE_H, 0, -1, 1);

  function makeHalfMesh(uMin, uMax, plateXOffset, rotateCCW) {
    const geom = new THREE.PlaneGeometry(PLATE_W / 2, PLATE_H);
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        tex: { value: unrolledTexture },
        uMin: { value: uMin }, uMax: { value: uMax },
        rotCCW: { value: rotateCCW ? 1.0 : 0.0 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D tex;
        uniform float uMin, uMax, rotCCW;
        varying vec2 vUv;
        void main() {
          float su, sv;
          if (rotCCW > 0.5) { su = 1.0 - vUv.y; sv = vUv.x; }
          else              { su = vUv.y;       sv = 1.0 - vUv.x; }
          float srcU = uMin + (uMax - uMin) * su;
          float srcV = sv;
          gl_FragColor = texture2D(tex, vec2(srcU, srcV));
        }
      `,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(plateXOffset + PLATE_W / 4, PLATE_H / 2, 0);
    return mesh;
  }

  scene.add(makeHalfMesh(0.0, 0.5, 0, false));
  scene.add(makeHalfMesh(0.5, 1.0, PLATE_W / 2, true));

  return { scene, camera };
}

// ============================================================
// LETTERBOXED OUTPUT
// ============================================================

function buildLetterboxedScene(texture, contentW, contentH) {
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, -1, 1);

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      tex: { value: texture },
      contentAspect: { value: contentW / contentH },
      windowAspect: { value: 1.0 },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D tex;
      uniform float contentAspect, windowAspect;
      varying vec2 vUv;
      void main() {
        vec2 scale;
        if (windowAspect > contentAspect) {
          scale = vec2(contentAspect / windowAspect, 1.0);
        } else {
          scale = vec2(1.0, windowAspect / contentAspect);
        }
        vec2 centered = (vUv - 0.5) / scale + 0.5;
        if (centered.x < 0.0 || centered.x > 1.0 || centered.y < 0.0 || centered.y > 1.0) {
          gl_FragColor = vec4(0.0, 0.0, 0.0, 1.0);
        } else {
          gl_FragColor = texture2D(tex, centered);
        }
      }
    `,
  });
  const geom = new THREE.PlaneGeometry(2, 2);
  scene.add(new THREE.Mesh(geom, mat));

  return { scene, camera, material: mat };
}

// ============================================================
// 3D ARCH PREVIEW
// ============================================================

function buildArchScene(plateTexture) {
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x202020);

  const camera = new THREE.PerspectiveCamera(50, 1, 100, 50000);
  camera.position.set(0, 1500, 7000);
  camera.lookAt(0, 800, 0);

  const grid = new THREE.GridHelper(6000, 12, 0x444444, 0x222222);
  grid.position.y = -700;
  scene.add(grid);

  const axes = new THREE.AxesHelper(800);
  scene.add(axes);

  for (const panel of PANELS) {
    const cell = PANEL_TO_CELL[panel.name];
    if (!cell) continue;
    const [col, row] = cell;

    const uMin = col / 4;
    const uMax = (col + 1) / 4;
    const vMin = 1 - (row + 1) / 4;
    const vMax = 1 - row / 4;

    const c = panel.corners;
    const positions = new Float32Array([
      c[0][0], c[0][1], c[0][2],
      c[1][0], c[1][1], c[1][2],
      c[2][0], c[2][1], c[2][2],
      c[3][0], c[3][1], c[3][2],
    ]);
    const isLeftSide = panel.name.startsWith('L');
    const uvs = isLeftSide
      ? new Float32Array([
          uMax, vMax, uMin, vMax, uMin, vMin, uMax, vMin,
        ])
      : new Float32Array([
          uMin, vMin, uMax, vMin, uMax, vMax, uMin, vMax,
        ]);
    const indices = [0, 1, 2, 0, 2, 3];

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geom.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    geom.setIndex(indices);
    geom.computeVertexNormals();

    const mat = new THREE.MeshBasicMaterial({
      map: plateTexture,
      side: THREE.DoubleSide,
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.userData.panelName = panel.name;
    scene.add(mesh);
  }

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 800, 0);
  controls.update();
  controls.enabled = false;

  return { scene, camera, controls };
}

// ============================================================
// MAIN
// ============================================================

let unrolledTarget, plateTarget;
let backgroundLayer, testCardsLayer, orbitLayer, particleLayer, markersLayer;
let platePass, flatScene, unrolledViewScene, archScene;
const MODES = ['unrolled', 'flat', 'arch'];
let currentModeIdx = 0;
const layers = { B: false, Q: true, '3': false, P: false, M: false };
let frameCount = 0;
let lastFpsUpdate = performance.now();
let computeTimeAccumMs = 0;       // sum of compute times since last FPS update
let computeTimeSamples = 0;
let archControls;
const startTime = performance.now();

async function init() {
  const [textures, backgrounds] = await Promise.all([loadAll(), loadBackgrounds()]);

  unrolledTarget = new THREE.WebGLRenderTarget(UNROLLED_W, UNROLLED_H, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat, type: THREE.UnsignedByteType,
    colorSpace: THREE.SRGBColorSpace,
    depthBuffer: true,
  });
  plateTarget = new THREE.WebGLRenderTarget(PLATE_W, PLATE_H, {
    minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter,
    format: THREE.RGBAFormat, type: THREE.UnsignedByteType,
    colorSpace: THREE.SRGBColorSpace,
  });

  backgroundLayer = buildBackgroundLayer(backgrounds);
  testCardsLayer = buildTestCardsLayer(textures);
  orbitLayer = buildOrbitLayer();
  particleLayer = buildParticleLayer();
  markersLayer = buildMarkersLayer();

  platePass = buildPlateScene(unrolledTarget.texture);
  flatScene = buildLetterboxedScene(plateTarget.texture, PLATE_W, PLATE_H);
  unrolledViewScene = buildLetterboxedScene(unrolledTarget.texture, UNROLLED_W, UNROLLED_H);
  const archResult = buildArchScene(plateTarget.texture);
  archScene = archResult;
  archControls = archResult.controls;

  setupHotkeys();
  connectOsc();
  animate();
}

function animate() {
  requestAnimationFrame(animate);

  const t = (performance.now() - startTime) / 1000;
  const windowAspect = window.innerWidth / window.innerHeight;
  flatScene.material.uniforms.windowAspect.value = windowAspect;
  unrolledViewScene.material.uniforms.windowAspect.value = windowAspect;

  const computeStart = performance.now();

  // === Render unrolled canvas with enabled layers ===
  // Always render into the fixed-size unrolledTarget regardless of window
  // dimensions, so layered content always lives in canvas-space.
  renderer.setRenderTarget(unrolledTarget);
  renderer.setViewport(0, 0, UNROLLED_W, UNROLLED_H);
  renderer.clear(true, true, true);

  if (layers.B) {
    renderer.render(backgroundLayer.scene, backgroundLayer.camera);
  }
  if (layers.Q) {
    renderer.render(testCardsLayer.scene, testCardsLayer.camera);
  }
  if (layers['3']) {
    orbitLayer.update(t);
    renderer.clearDepth();
    renderer.render(orbitLayer.scene, orbitLayer.camera);
  }
  if (layers.P) {
    particleLayer.update(t);
    renderer.clearDepth();
    renderer.render(particleLayer.scene, particleLayer.camera);
  }
  if (layers.M) {
    renderer.clearDepth();
    renderer.render(markersLayer.scene, markersLayer.camera);
  }

  // === Strip-and-rotate to plate ===
  renderer.setRenderTarget(plateTarget);
  renderer.setViewport(0, 0, PLATE_W, PLATE_H);
  renderer.clear(true, true, true);
  renderer.render(platePass.scene, platePass.camera);

  // === Render to screen ===
  renderer.setRenderTarget(null);
  renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
  renderer.clear(true, true, true);
  const mode = MODES[currentModeIdx];
  if (mode === 'flat') {
    renderer.render(flatScene.scene, flatScene.camera);
  } else if (mode === 'unrolled') {
    renderer.render(unrolledViewScene.scene, unrolledViewScene.camera);
  } else {
    archControls.update();
    renderer.render(archScene.scene, archScene.camera);
  }

  // Issue a GPU fence and wait for it (briefly) so performance.now()
  // reflects GPU completion, not just CPU submission. We use a tiny
  // timeout (1ms) to keep the measurement honest without blocking
  // longer than we'd like. If the GPU isn't done in 1ms, we under-
  // measure but don't stall — acceptable for a benchmark display.
  const gl2 = renderer.getContext();
  if (gl2.fenceSync) {
    const fence = gl2.fenceSync(gl2.SYNC_GPU_COMMANDS_COMPLETE, 0);
    gl2.flush();
    gl2.clientWaitSync(fence, 0, 1_000_000);  // wait up to 1ms (in nanoseconds)
    gl2.deleteSync(fence);
  } else {
    gl2.flush();
  }
  const computeEnd = performance.now();
  computeTimeAccumMs += (computeEnd - computeStart);
  computeTimeSamples++;

  frameCount++;
  const now = performance.now();
  if (now - lastFpsUpdate > 500) {
    const fps = (frameCount * 1000 / (now - lastFpsUpdate));
    const avgComputeMs = computeTimeSamples > 0 ? (computeTimeAccumMs / computeTimeSamples) : 0;
    const computeFps = avgComputeMs > 0 ? (1000 / avgComputeMs) : 0;
    document.getElementById('fps').textContent =
      `${fps.toFixed(1)} fps  (${avgComputeMs.toFixed(1)} ms = ${computeFps.toFixed(0)} fps compute)`;
    frameCount = 0;
    lastFpsUpdate = now;
    computeTimeAccumMs = 0;
    computeTimeSamples = 0;
  }
}

function updateLayerLabels() {
  for (const k of ['B', 'Q', '3', 'P', 'M']) {
    const el = document.getElementById('layer-' + k.toLowerCase());
    if (el) el.className = layers[k] ? 'layer-on' : 'layer-off';
  }
}

// ============================================================
// OSC CLIENT (via WebSocket bridge)
// Connects to the bridge at ws://localhost:9001 (the bridge listens
// for OSC on UDP 9000 and forwards to this WebSocket as JSON).
// Auto-reconnects if the bridge isn't running yet.
// ============================================================

const OSC_WS_URL = `ws://${location.hostname || 'localhost'}:9001`;
let oscSocket = null;
let oscReconnectTimer = null;

function setOscStatus(connected) {
  const el = document.getElementById('osc-status');
  if (!el) return;
  if (connected) {
    el.textContent = 'OSC ●';
    el.className = 'osc-on';
  } else {
    el.textContent = 'OSC ○';
    el.className = 'osc-off';
  }
}

function connectOsc() {
  try {
    oscSocket = new WebSocket(OSC_WS_URL);
  } catch (err) {
    scheduleOscReconnect();
    return;
  }

  oscSocket.addEventListener('open', () => {
    console.log(`[osc] connected to ${OSC_WS_URL}`);
    setOscStatus(true);
  });

  oscSocket.addEventListener('message', (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'osc') handleOscMessage(msg.address, msg.args);
    } catch (err) {
      console.warn('[osc] bad message:', evt.data);
    }
  });

  oscSocket.addEventListener('close', () => {
    setOscStatus(false);
    scheduleOscReconnect();
  });

  oscSocket.addEventListener('error', () => {
    // 'close' will follow; reconnection is handled there
  });
}

function scheduleOscReconnect() {
  if (oscReconnectTimer) return;
  oscReconnectTimer = setTimeout(() => {
    oscReconnectTimer = null;
    connectOsc();
  }, 2000);
}

function handleOscMessage(address, args) {
  // Match the Unity OSC contract: /portal/keystroke with one string arg
  // representing the key name. Forwards to the same handler as keyboard.
  if (address === '/portal/keystroke' && args.length > 0) {
    const key = String(args[0]);
    console.log(`[osc] keystroke: ${key}`);
    handleKeystroke(key);
  } else {
    console.log(`[osc] (unhandled) ${address} ${JSON.stringify(args)}`);
  }
}

// ============================================================
// KEYSTROKE DISPATCH
// Single entry point for both keyboard input and incoming OSC.
// Adding a new hotkey here automatically makes it OSC-controllable.
// ============================================================

function handleKeystroke(key) {
  // Normalize: accept 'Tab', 'q', 'Q', etc. Use single canonical lower-case
  // for letters; preserve 'Tab' and digit keys.
  if (key === 'Tab') {
    currentModeIdx = (currentModeIdx + 1) % MODES.length;
    const mode = MODES[currentModeIdx];
    if (archControls) archControls.enabled = (mode === 'arch');
    document.getElementById('mode').textContent = mode.toUpperCase();
    return;
  }
  const k = key.length === 1 ? key.toLowerCase() : key;
  switch (k) {
    case 'q':
      layers.Q = !layers.Q;
      if (layers.Q) layers.B = false;  // Q and B mutually exclusive
      updateLayerLabels();
      break;
    case '3':
      layers['3'] = !layers['3'];
      updateLayerLabels();
      break;
    case 'p':
      layers.P = !layers.P;
      if (layers.P && particleLayer) particleLayer.reset();
      updateLayerLabels();
      break;
    case 'm':
      layers.M = !layers.M;
      updateLayerLabels();
      break;
    case 'b':
      layers.B = !layers.B;
      if (layers.B) layers.Q = false;
      updateLayerLabels();
      break;
    case 'n':
      if (backgroundLayer && backgroundLayer.count() > 0) {
        backgroundLayer.cycle();
        layers.B = true;
        layers.Q = false;
        updateLayerLabels();
      }
      break;
    case 'f':
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        document.exitFullscreen();
      }
      break;
    case 'r':
      if (archScene && archControls) {
        archScene.camera.position.set(0, 1500, 7000);
        archControls.target.set(0, 800, 0);
        archControls.update();
      }
      break;
  }
}

function setupHotkeys() {
  window.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') e.preventDefault();
    handleKeystroke(e.key);
  });

  function applyResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    // Lock pixel ratio to 1. On high-DPR displays (Retina, or some 8K
    // configurations) macOS reports DPR > 1, which would tell three.js to
    // allocate a backing buffer larger than the display — causing render
    // overshoot/cropping issues in fullscreen. We want a 1:1 mapping
    // between CSS pixels and GPU pixels.
    renderer.setPixelRatio(1);
    renderer.setSize(w, h, true);

    // Defensive: explicitly set canvas style and attribute dimensions
    const canvas = renderer.domElement;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';

    if (archScene && archScene.camera) {
      archScene.camera.aspect = w / h;
      archScene.camera.updateProjectionMatrix();
    }
    if (flatScene) flatScene.material.uniforms.windowAspect.value = w / h;
    if (unrolledViewScene) unrolledViewScene.material.uniforms.windowAspect.value = w / h;
  }

  window.addEventListener('resize', applyResize);

  // Fullscreen transitions can fire 'resize' BEFORE the browser actually
  // changes the viewport size, and Chrome/Safari finalize their transitions
  // at different timings. Re-apply at multiple intervals to catch them.
  document.addEventListener('fullscreenchange', () => {
    applyResize();
    requestAnimationFrame(applyResize);
    setTimeout(applyResize, 50);
    setTimeout(applyResize, 200);
    setTimeout(applyResize, 500);
  });
  document.addEventListener('webkitfullscreenchange', () => {
    applyResize();
    requestAnimationFrame(applyResize);
    setTimeout(applyResize, 50);
    setTimeout(applyResize, 200);
    setTimeout(applyResize, 500);
  });

  // Trigger initial sizing
  applyResize();
}

init().catch(err => {
  document.getElementById('info').innerHTML = `<b>Error:</b> ${err}`;
  console.error(err);
});
</script>
</body>
</html>
